<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | Институт НМСТ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Институт <span>НМСТ</span></a>
            <a href="index.html" class="btn-register-sm" style="background: transparent; border: 1px solid var(--primary-color);">На главную</a>
        </nav>
    </header>

    <div class="page-container">
        <div class="auth-box fade-in-section is-visible">
            <h2>Создание аккаунта</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="email">E-mail адрес</label>
                    <input type="email" id="email" required placeholder="Введите ваш email">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" required placeholder="Придумайте пароль">
                </div>
                <button type="submit" class="btn-submit">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <script>
        // Имитация успешной регистрации и переход в личный кабинет
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Останавливаем стандартную отправку
            window.location.href = 'dashboard.html'; // Перенаправляем
        });
    </script>
</body>
</html>
