<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | Институт НМСТ</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Локальные стили для кабинета */
        .status-stepper {
            display: flex;
            justify-content: space-between;
            margin: 30px 0;
            position: relative;
        }
        .status-stepper::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.1);
            z-index: 1;
        }
        .step {
            position: relative;
            z-index: 2;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .step-icon {
            width: 32px;
            height: 32px;
            background: #162028;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .step.active .step-icon {
            border-color: var(--primary-color);
            color: var(--primary-color);
            box-shadow: 0 0 10px rgba(114, 191, 68, 0.3);
        }
        .step.active { color: var(--text-light); }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .data-table th, .data-table td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .data-table th { color: var(--primary-color); font-size: 0.9rem; }
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            background: rgba(114, 191, 68, 0.1);
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Институт <span>НМСТ</span></a>
            <div style="display: flex; gap: 15px; align-items: center;">
                <span id="userEmail" style="color: var(--text-muted); font-size: 0.9rem;">user@example.com</span>
                <a href="index.html" class="btn-register-sm">Выйти</a>
            </div>
        </nav>
    </header>

    <div class="page-container">
        <div class="content-box fade-in-section is-visible">
            <h2 id="dashboardTitle">Ваши заявки</h2>
            
            <div class="status-stepper" id="mainStepper">
                <div class="step" id="step1">
                    <div class="step-icon">1</div>
                    <span>Подано</span>
                </div>
                <div class="step" id="step2">
                    <div class="step-icon">2</div>
                    <span>Проверка тех. секретарем</span>
                </div>
                <div class="step" id="step3">
                    <div class="step-icon">3</div>
                    <span>Рецензирование</span>
                </div>
                <div class="step" id="step4">
                    <div class="step-icon">4</div>
                    <span>Принято</span>
                </div>
            </div>

            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Название проекта</th>
                        <th>Дата подачи</th>
                        <th>Статус</th>
                    </tr>
                </thead>
                <tbody id="submissionsTableBody"></tbody>
            </table>
        </div>

        <div class="dashboard-grid">
            <div class="content-box fade-in-section is-visible">
                <h3>Настройки профиля</h3>
                <div class="form-group" style="margin-top: 15px; max-width: 400px;">
                    <label for="userNameInput">Ваше имя (будет отображаться на главной)</label>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <input type="text" id="userNameInput" placeholder="Введите имя">
                        <button onclick="saveName()" class="btn-register-sm" style="height: 42px;">Сохранить</button>
                    </div>
                </div>
            </div>
            <div class="dashboard-card">
                <h3>Документы</h3>
                <p id="docsText" style="color: var(--text-muted); margin-top: 10px;">Здесь появятся квитанции после одобрения заявки.</p>
            </div>
            <div class="dashboard-card">
                <h3>Новая работа?</h3>
                <a href="apply.html" class="btn-submit" style="display: block; width: 100%; text-decoration: none; text-align: center;">Подать еще один проект</a>
            </div>
        </div>
    </div>

    <script>
        // --- Установка Email и загрузка имени ---
        const userEmail = localStorage.getItem('userEmail') || 'student_miet@mail.ru';
        document.getElementById('userEmail').innerText = userEmail;

        const savedName = localStorage.getItem('userName');
        if (savedName) {
            document.getElementById('userNameInput').value = savedName;
        }

        function saveName() {
            const name = document.getElementById('userNameInput').value;
            if (name) {
                localStorage.setItem('userName', name);
                alert("Имя сохранено!");
                location.reload(); 
            }
        }

        // --- Функция ВЫХОДА из аккаунта ---
        function logout() {
            // Очищаем данные пользователя, но можем оставить заявки (или тоже удалить)
            localStorage.removeItem('userName');
            localStorage.removeItem('userEmail');
            // Перекидываем на главную
            window.location.href = 'index.html';
        }

        // Навешиваем событие на кнопку "Выйти" в шапке
        document.querySelector('.btn-register-sm[href="index.html"]').addEventListener('click', function(e) {
            e.preventDefault(); // Останавливаем обычный переход
            logout(); // Запускаем нашу функцию
        });

        // --- Функция УДАЛЕНИЯ заявки ---
        function deleteSubmission(idToDelete) {
            if(confirm("Вы уверены, что хотите отозвать эту заявку?")) {
                let submissions = JSON.parse(localStorage.getItem('userSubmissions')) || [];
                // Фильтруем массив, оставляя только те заявки, у которых ID не совпадает с удаляемым
                submissions = submissions.filter(sub => sub.id !== idToDelete);
                localStorage.setItem('userSubmissions', JSON.stringify(submissions));
                loadSubmissions(); // Перерисовываем таблицу
            }
        }

        // --- Функция для отрисовки таблицы из LocalStorage ---
        function loadSubmissions() {
            const tableBody = document.getElementById('submissionsTableBody');
            const submissions = JSON.parse(localStorage.getItem('userSubmissions')) || [];
            
            // Сбрасываем степпер
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('mainStepper').style.opacity = "1";

            if (submissions.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 20px; color: var(--text-muted);">У вас пока нет активных заявок</td></tr>';
                document.getElementById('mainStepper').style.opacity = "0.3";
                return;
            }

            tableBody.innerHTML = "";
            // Копируем и переворачиваем, чтобы новые были сверху
            [...submissions].reverse().forEach(sub => {
                const row = `
                    <tr>
                        <td>${sub.id}</td>
                        <td>${sub.topic}</td>
                        <td>${sub.date}</td>
                        <td><span class="badge">${sub.status}</span></td>
                        <td>
                            <button onclick="deleteSubmission('${sub.id}')" style="background:none; border:none; color:#ff4d4d; cursor:pointer; font-size:1.2rem;" title="Удалить заявку">✖</button>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

            // Обновляем степпер по последней заявке
            const latestSub = submissions[submissions.length - 1];
            if (latestSub.status === "Подано" || latestSub.status === "В процессе") {
                document.getElementById('step1').classList.add('active');
            }
        }

        loadSubmissions();
    </script>
</body>
</html>
