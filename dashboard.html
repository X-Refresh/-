<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | Институт НМСТ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Институт <span>НМСТ</span></a>
            <a href="index.html" class="btn-register-sm">Выйти</a>
        </nav>
    </header>

    <div class="page-container">
        <div class="content-box fade-in-section is-visible">
            <h2>Добро пожаловать в Личный кабинет!</h2>
            <p>Здесь вы сможете управлять своими заявками, отслеживать статус проверки тезисов и оплачивать организационный взнос.</p>
            
            <div class="dashboard-grid">
                <div class="dashboard-card">
                    <h3>Мои заявки</h3>
                    <p style="color: var(--text-muted); margin-top: 10px;">У вас пока нет активных заявок.</p>
                    <a href="apply.html" class="btn-submit" style="display: block; width: 80%; margin: 20px auto 0;">Подать заявку</a>
                </div>
                <div class="dashboard-card">
                    <h3>Статус оплаты</h3>
                    <p style="color: var(--text-muted); margin-top: 10px;">Квитанции не сформированы.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
